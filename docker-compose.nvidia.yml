services:
  vllm-omni:
    build:
      context: .
      dockerfile: Dockerfile.vllm.nvidia
    image: custom/vllm-omni-nvidia:latest
    container_name: vllm-omni-nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: '16gb'
    ipc: host
    network_mode: host
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    command: >
      python3 -m vllm.entrypoints.omni.api_server 
      --model Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice 
      --engine-use-ray 
      --pipeline-parallel-size 1 
      --host 0.0.0.0 
      --port 8001

  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: voice-api-nvidia
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./backend:/app
      - ./frontend/dist:/app/static
      - ./obsidian_vault:/app/vault
      - ./voice_library:/app/voice_library
    environment:
      - VLLM_API_URL=http://localhost:8001/v1
      - LLM_API_BASE=${LLM_API_BASE:-http://localhost:11434/v1}
      - LLM_API_KEY=${LLM_API_KEY:-ollama}
      - LLM_MODEL=${LLM_MODEL:-llama3}
    command: uvicorn server:app --host ${API_HOST:-0.0.0.0} --port ${API_PORT:-8000} --reload
